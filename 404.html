<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide@0.446.0/dist/umd/lucide.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.446.0/dist/umd/lucide.min.js"></script>
    <style>
        body {
            background-color: #1a1a2e;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
    </style>
</head>
<body class="flex items-center justify-center">
    <div class="text-center">
        <div class="mb-8">
            <i data-lucide="file-question" class="w-24 h-24 mx-auto text-gray-400"></i>
        </div>
        <h1 class="text-6xl font-bold text-white mb-4">404</h1>
        <p class="text-2xl text-gray-300 mb-8">页面未找到</p>
        <p class="text-gray-400 mb-8">抱歉，您访问的页面不存在或已被移除</p>
        <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-colors">
            <i data-lucide="home" class="w-5 h-5"></i>
            返回首页
        </a>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
